name: Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Get current version
      id: get_version
      run: |
        VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
        echo "current_version=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"
        
    - name: Determine version bump type
      id: version_bump
      run: |
        # Check if this is a tag push
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "bump_type=major" >> $GITHUB_OUTPUT
          echo "Version bump: MAJOR (tag push)"
        else
          echo "bump_type=minor" >> $GITHUB_OUTPUT
          echo "Version bump: MINOR (PR merge)"
        fi
        
    - name: Calculate new version
      id: new_version
      run: |
        CURRENT="${{ steps.get_version.outputs.current_version }}"
        BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
        
        IFS='.' read -r -a parts <<< "$CURRENT"
        major="${parts[0]}"
        minor="${parts[1]}"
        patch="${parts[2]:-0}"
        
        if [ "$BUMP_TYPE" = "major" ]; then
          major=$((major + 1))
          minor=0
          patch=0
        elif [ "$BUMP_TYPE" = "minor" ]; then
          minor=$((minor + 1))
          patch=0
        fi
        
        NEW_VERSION="$major.$minor.$patch"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"
        
    - name: Update version in gradle.properties
      run: |
        sed -i "s/^mod_version=.*/mod_version=${{ steps.new_version.outputs.version }}/" gradle.properties
        echo "Updated gradle.properties to version ${{ steps.new_version.outputs.version }}"
        
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Commit version bump
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add gradle.properties
        git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}" || echo "No changes to commit"
        
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.new_version.outputs.version }}
        name: Release v${{ steps.new_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-from-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Create Release from Tag
      uses: softprops/action-gh-release@v1
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
